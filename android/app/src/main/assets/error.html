<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Connection Problem</title>
<style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, Roboto, "Segoe UI", sans-serif;
        background: #0b0b0f;
        color: #f4f4f5;
    }
    .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        text-align: center;
    }
    .icon {
        width: 64px;
        height: 64px;
        margin-bottom: 20px;
        opacity: 0.85;
    }
    h1 {
        font-size: 19px;
        font-weight: 700;
        margin: 0 0 8px;
    }
    p {
        font-size: 14px;
        line-height: 1.5;
        color: #a1a1aa;
        margin: 0 0 28px;
        max-width: 320px;
    }
    button {
        appearance: none;
        border: none;
        border-radius: 10px;
        background: #f59e0b;
        color: #111827;
        font-size: 15px;
        font-weight: 700;
        padding: 12px 28px;
        cursor: pointer;
    }
    button:active { opacity: 0.85; }
</style>
</head>
<body>
    <div class="wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12 18.75h.008v.008H12v-.008Z"/>
        </svg>
        <h1>Connection Problem</h1>
        <p>We couldn't reach the server. Please check your internet connection and try again.</p>
        <button id="retry">Try Again</button>
    </div>
    <script>
        // The app's real server URL is passed as ?target=... when this page
        // is loaded, so Retry re-attempts the actual app, not itself.
        var target = new URLSearchParams(location.search).get('target') || 'about:blank';
        document.getElementById('retry').addEventListener('click', function () {
            location.href = target;
        });
    </script>
</body>
</html>
