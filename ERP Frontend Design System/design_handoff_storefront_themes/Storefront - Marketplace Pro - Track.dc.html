<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; }
  </style>
</helmet>

<div style="font-family: 'Source Sans 3', sans-serif; background: #F5F6F8; color: #14181F; min-height: 100vh;">

  <header style="background: #0F2A43; padding: 18px 0;">
    <div style="max-width: 900px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between;">
      <a href="Storefront - Marketplace Pro.dc.html" style="display:flex; align-items:center; gap:10px; text-decoration:none;">
        <div style="width:38px; height:38px; border-radius:9px; background:#FF6A00; display:grid; place-items:center; font-family:'Manrope',sans-serif; font-weight:800; color:#0F2A43; font-size:18px;">GM</div>
        <div style="font-family:'Manrope',sans-serif; font-weight:800; font-size:20px; color:#fff;">Garments Machinery Co.</div>
      </a>
      <div style="color:#fff; font-weight:700; font-size:15px;">Track Order</div>
    </div>
  </header>

  <div style="max-width:900px; margin:40px auto 0; padding:0 32px 60px;">

    <div style="background:#fff; border-radius:12px; padding:24px 28px; display:flex; align-items:center; justify-content:space-between; gap:20px; margin-bottom:24px;">
      <div>
        <div style="font-size:12.5px; color:#6B7885; font-weight:600;">Order</div>
        <div style="font-family:'Manrope',sans-serif; font-weight:800; font-size:19px;">GM-20260703-0042</div>
      </div>
      <div style="background:#FFF1E6; color:#B85200; font-weight:700; font-size:13px; padding:8px 16px; border-radius:999px;">In transit</div>
    </div>

    <div style="background:#fff; border-radius:12px; padding:28px;">
      <h2 style="font-family:'Manrope',sans-serif; font-size:16px; font-weight:800; margin:0 0 22px;">Tracking updates</h2>

      <div style="position:relative; padding-left:28px;">
        <div style="position:absolute; left:9px; top:6px; bottom:14px; width:2px; background:#E5E8EB;"></div>
        <sc-for list="{{ trackingSteps }}" as="s" hint-placeholder-count="4">
          <div style="position:relative; padding-bottom:26px;">
            <div style="position:absolute; left:-28px; top:2px; width:20px; height:20px; border-radius:50%; background:{{ s.dotBg }}; display:grid; place-items:center;">
              <div style="width:8px; height:8px; border-radius:50%; background:{{ s.dotColor }};"></div>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <div style="font-weight:700; font-size:14px;">{{ s.title }}</div>
              <sc-if value="{{ s.latest }}" hint-placeholder-val="{{ false }}">
                <span style="background:#0F2A43; color:#fff; font-size:10px; font-weight:700; padding:3px 8px; border-radius:999px;">Latest</span>
              </sc-if>
            </div>
            <div style="font-size:12.5px; color:#6B7885; margin-top:3px;">{{ s.time }}</div>
          </div>
        </sc-for>
      </div>
    </div>

    <div style="background:#fff; border-radius:12px; padding:24px 28px; margin-top:20px; display:flex; justify-content:space-between; font-size:13.5px;">
      <div>
        <div style="color:#6B7885; margin-bottom:4px;">Courier</div>
        <div style="font-weight:700;">Steadfast &middot; TRK-88213456</div>
      </div>
      <div>
        <div style="color:#6B7885; margin-bottom:4px;">Total</div>
        <div style="font-weight:700;">৳294,860</div>
      </div>
    </div>
  </div>

  <footer style="background:#071A2C; color:#C7D3DE; padding:24px 32px; text-align:center; font-size:12px;">
    &copy; 2026 Garments Machinery Company. All rights reserved.
  </footer>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>

class Component extends DCLogic {
  renderVals() {
    const trackingSteps = [
      { title: 'Order confirmed', time: 'Jul 3, 10:12 AM', dotBg: '#DDEAE0', dotColor: '#1A7F37', latest: false },
      { title: 'Picked up by courier', time: 'Jul 3, 3:40 PM', dotBg: '#DDEAE0', dotColor: '#1A7F37', latest: false },
      { title: 'In transit', time: 'Jul 4, 9:05 AM', dotBg: '#FFF1E6', dotColor: '#FF6A00', latest: true },
      { title: 'Out for delivery', time: 'Pending', dotBg: '#EDEFF1', dotColor: '#B7C0C8', latest: false },
    ];
    return { trackingSteps };
  }
}

</script>
</body>
</html>
