<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; }
  </style>
</helmet>

<div style="font-family: 'Source Sans 3', sans-serif; background: #F5F6F8; color: #14181F; min-height: 100vh;">

  <header style="background: #0F2A43; padding: 18px 0;">
    <div style="max-width: 1100px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between;">
      <a href="Storefront - Marketplace Pro.dc.html" style="display:flex; align-items:center; gap:10px; text-decoration:none;">
        <div style="width:38px; height:38px; border-radius:9px; background:#FF6A00; display:grid; place-items:center; font-family:'Manrope',sans-serif; font-weight:800; color:#0F2A43; font-size:18px;">GM</div>
        <div style="font-family:'Manrope',sans-serif; font-weight:800; font-size:20px; color:#fff;">Garments Machinery Co.</div>
      </a>
      <div style="color:#fff; font-weight:700; font-size:15px;">Secure Checkout</div>
    </div>
  </header>

  <!-- Steps -->
  <div style="max-width:1100px; margin:24px auto 0; padding:0 32px; display:flex; gap:10px; align-items:center; font-size:13px; font-weight:700; color:#8A97A3;">
    <span style="color:#0F2A43;">1. Delivery details</span>
    <span>&rarr;</span>
    <span>2. Review order</span>
    <span>&rarr;</span>
    <span>3. Confirmation</span>
  </div>

  <div style="max-width:1100px; margin:20px auto 0; padding:0 32px 60px; display:grid; grid-template-columns:1fr 340px; gap:26px;">

    <div style="background:#fff; border-radius:12px; padding:26px;">
      <h1 style="font-family:'Manrope',sans-serif; font-size:19px; font-weight:800; margin:0 0 20px;">Delivery details</h1>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
        <div>
          <label style="font-size:12.5px; font-weight:700; color:#3D4952;">Full name</label>
          <input type="text" style="width:100%; margin-top:6px; border:1px solid #DDE3E9; border-radius:8px; padding:11px 12px; font-size:14px;">
        </div>
        <div>
          <label style="font-size:12.5px; font-weight:700; color:#3D4952;">Phone number</label>
          <input type="text" style="width:100%; margin-top:6px; border:1px solid #DDE3E9; border-radius:8px; padding:11px 12px; font-size:14px;">
        </div>
      </div>

      <div style="margin-bottom:16px;">
        <label style="font-size:12.5px; font-weight:700; color:#3D4952;">Delivery address</label>
        <textarea rows="3" style="width:100%; margin-top:6px; border:1px solid #DDE3E9; border-radius:8px; padding:11px 12px; font-size:14px; resize:none; font-family:inherit;"></textarea>
      </div>

      <div style="margin-bottom:22px;">
        <label style="font-size:12.5px; font-weight:700; color:#3D4952;">Order note (optional)</label>
        <textarea rows="2" style="width:100%; margin-top:6px; border:1px solid #DDE3E9; border-radius:8px; padding:11px 12px; font-size:14px; resize:none; font-family:inherit;"></textarea>
      </div>

      <div style="font-weight:700; font-size:14px; margin-bottom:10px;">Payment method</div>
      <sc-for list="{{ paymentMethods }}" as="m" hint-placeholder-count="3">
        <label style="display:flex; align-items:center; gap:10px; border:1px solid #DDE3E9; border-radius:8px; padding:13px 14px; margin-bottom:10px; cursor:pointer;">
          <input type="radio" name="pay">
          <span style="font-size:13.5px; font-weight:600;">{{ m }}</span>
        </label>
      </sc-for>
    </div>

    <div>
      <div style="background:#fff; border-radius:12px; padding:22px;">
        <h2 style="font-family:'Manrope',sans-serif; font-size:16px; font-weight:800; margin:0 0 16px;">Order summary</h2>
        <div style="display:flex; justify-content:space-between; font-size:13.5px; color:#3D4952; margin-bottom:10px;">
          <span>Subtotal (3 items)</span><span>৳256,400</span>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:13.5px; color:#3D4952; margin-bottom:10px;">
          <span>VAT (15%)</span><span>৳38,460</span>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:13.5px; color:#1A7F37; font-weight:700; margin-bottom:16px;">
          <span>Delivery</span><span>Free</span>
        </div>
        <div style="border-top:1px solid #EDEFF1; padding-top:16px; display:flex; justify-content:space-between; font-family:'Manrope',sans-serif; font-weight:800; font-size:18px; margin-bottom:20px;">
          <span>Total</span><span>৳294,860</span>
        </div>
        <button style="width:100%; background:#FF6A00; color:#fff; border:none; padding:13px; border-radius:8px; font-weight:700; font-size:14.5px; cursor:pointer;">Place order</button>
      </div>
    </div>
  </div>

  <footer style="background:#071A2C; color:#C7D3DE; padding:24px 32px; text-align:center; font-size:12px;">
    &copy; 2026 Garments Machinery Company. All rights reserved.
  </footer>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>

class Component extends DCLogic {
  renderVals() {
    const paymentMethods = ['Cash on delivery', 'bKash', 'Bank transfer / cheque'];
    return { paymentMethods };
  }
}

</script>
</body>
</html>
