name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, dom, fileinfo, filter, gd, iconv, intl, mbstring, pdo_sqlite, sqlite3, xml, xmlreader, xmlwriter, zip
          coverage: none

      - name: Install PHP dependencies for tests
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Prepare Laravel test environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Discover Laravel packages
        run: php artisan package:discover --ansi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run tests
        run: |
          php artisan test

  build-android:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: business-dashboard-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
