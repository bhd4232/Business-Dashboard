name: Deploy to Production Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, dom, fileinfo, filter, gd, iconv, intl, mbstring, pdo_sqlite, sqlite3, xml, xmlreader, xmlwriter, zip
          coverage: none

      - name: Install PHP dependencies for tests
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Prepare Laravel test environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Discover Laravel packages
        run: php artisan package:discover --ansi

      - name: Run tests
        run: |
          php artisan test --env=testing

      - name: Validate deployment secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          missing=0

          for secret in SERVER_HOST SERVER_USER SERVER_SSH_KEY SERVER_PORT DEPLOY_PATH; do
            if [ -z "${!secret}" ]; then
              echo "::error::Missing required GitHub secret: ${secret}"
              missing=1
            fi
          done

          exit "${missing}"

      - name: Deploy to server via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SERVER_PORT}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts

          remote_deploy_path=$(printf '%q' "${DEPLOY_PATH}")

          ssh -i ~/.ssh/deploy_key -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" "DEPLOY_PATH=${remote_deploy_path} bash -se" <<'REMOTE_SCRIPT'
            set -euo pipefail

            cd "${DEPLOY_PATH}"
            git pull --ff-only origin main
            composer install --no-dev --prefer-dist --no-interaction --no-progress --no-scripts
            php artisan package:discover --ansi
            npm ci
            npm run build
            php artisan down --retry=60 || true
            trap 'php artisan up' EXIT
            php artisan backup:database
            php artisan optimize:clear
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan queue:restart || true
            php artisan up
            trap - EXIT
          REMOTE_SCRIPT
